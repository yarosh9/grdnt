<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base">
      <stop stop-color="#ff0" stop-opacity="0" offset="0" />
      <stop stop-color="#ff9" offset=".35" />
      <stop stop-color="#ff0" stop-opacity="0" offset=".35" />
      <stop stop-color="#ff0" stop-opacity="0" offset="1" />
    </linearGradient>

    <linearGradient href="#base" id="g1" x1=".025" y1=".025" x2="0" y2="0" spreadMethod="reflect" />
    <linearGradient href="#base" id="g2" x1=".025" y1=".05" x2="0" y2="0" spreadMethod="reflect" />

    <linearGradient id="bg" x2=".3" y2=".1" spreadMethod="reflect">
      <stop stop-color="#ad0" offset="0" />
      <stop stop-color="#150" offset="1" />
    </linearGradient>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)" />
  <rect width="1000" height="1000" fill="url(#g2)" opacity=".2" />
  <rect width="1000" height="1000" y="-1000" transform="rotate(90)" fill="url(#g2)" opacity=".2" />
  <rect width="1000" height="1000" fill="url(#g1)" opacity=".2" />
  <rect width="1000" height="1000" y="-1000" transform="rotate(90)" fill="url(#g1)" opacity=".2" />
</svg>