<svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="myLinearGradientStops">
      <stop offset="0.000" stop-color="#000000" />
      <stop offset="0.973" stop-color="#000000" />
      <stop offset="0.973" stop-color="#ffffff" />
      <stop offset="1.000" stop-color="#ffffff" />
    </linearGradient>
    -- двигаешь стоп, 0.01 до 0.99 меняешь толщину белой и  черной линии, сейчас поровну --
    <radialGradient id="myRadialGradientRelative"
                    spreadMethod="reflect"
                    xlink:href="#myLinearGradientStops"
                    cx="500" cy="500" fx="500" fy="500" r="50" 
                    gradientUnits="userSpaceOnUse"/>
                    -- меняешь радиус "r" - меняешь количество линий --
  </defs>
  <rect x="0" y="0" width="1000" height="1000" fill="url(#myRadialGradientRelative)" stroke="none" />
</svg>